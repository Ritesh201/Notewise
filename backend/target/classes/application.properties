spring.application.name=notewise-backend

# DataSource — overridden by SPRING_DATASOURCE_URL env var in Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notewise}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:notewise}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:notewise_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Server
server.port=${PORT:4000}

# JWT
app.jwt.secret=${JWT_SECRET:super_secret_jwt_key_must_be_at_least_256_bits_long_for_hs256}
app.jwt.expiration-ms=604800000

# Anthropic (optional — falls back to TF-IDF if blank)
app.anthropic.api-key=${ANTHROPIC_API_KEY:}
app.anthropic.embedding-model=voyage-3

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://frontend}
